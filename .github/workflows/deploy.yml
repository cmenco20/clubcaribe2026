name: Deploy Club Caribe

on:
  push:
    branches:
      - main   # Se ejecuta cada vez que subes cambios a la rama main

permissions:
  contents: write  # Necesario para publicar en GitHub Pages

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Genera config.js con las URLs secretas (nunca visibles en el repo)
      - name: Crear config.js con URLs de Power Automate
        run: |
          cat > config.js << 'EOF'
          /* Generado automáticamente por GitHub Actions — NO editar */
          const POWER_AUTOMATE_URL = "${{ secrets.POWER_AUTOMATE_URL }}";
          const POWER_AUTOMATE_LISTAR_URL = "${{ secrets.POWER_AUTOMATE_LISTAR_URL }}";
          EOF

      # 3. Publica todos los archivos en GitHub Pages
      - name: Publicar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./          # Publica desde la raíz del repo
          publish_branch: gh-pages # Rama que usa GitHub Pages
